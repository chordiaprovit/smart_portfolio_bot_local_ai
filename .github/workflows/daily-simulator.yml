name: Daily Portfolio Simulation

on:
  schedule:
    # Monday to Friday at 18:00 UTC (6pm) — S&P data update
    - cron: "0 18 * * 1-5"
    # Monday to Friday at 11:30 UTC (6:30 AM ET) — Morning digest
    - cron: "30 11 * * 1-5"
  workflow_dispatch:

jobs:
  run-simulator:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(github.event.schedule, '0 18'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run S&P 500 simulator
        run: |
          python3 update_snp500_history.py

      - name: Commit S&P 500 data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snp500_30day.csv data/snp500_30day_wide.csv data || true
          git commit -m "Update S&P 500 [skip ci]" || echo "No changes to commit"
          git push

      - name: Run ETF updater
        run: |
          python3 etf_updates.py

      - name: Commit ETF data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_prices_converted.csv || true
          git commit -m "Update ETF data [skip ci]" || echo "No changes to commit"
          git push

  send_morning_digest:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(github.event.schedule, '30 11'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-digest-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-digest-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt feedparser edgartools

      - name: Send morning digest
        run: python digest_mailer.py --send
        env:
          DIGEST_SENDER_EMAIL: ${{ secrets.DIGEST_SENDER_EMAIL }}
          DIGEST_SENDER_PASS: ${{ secrets.DIGEST_SENDER_PASS }}
